data:
  train_files: /path/to/remote/data/train.parquet
  val_files: /path/to/remote/data/test.parquet
  prompt_key: prompt
  response_key: response
  max_prompt_length: 1024
  max_response_length: 1024
  rollout_batch_size: 1024  # Large batch size for A100s
  shuffle: True

actor_rollout_ref:
  hybrid_engine: True
  model:
    path: /path/to/remote/model/Qwen2.5-0.5B-Instruct # Update this path
    use_remove_padding: True
    enable_gradient_checkpointing: True
    use_fused_kernels: True # Enable for A100
  actor:
    strategy: fsdp
    ppo_mini_batch_size: 256
    ppo_micro_batch_size: 64
    use_kl_loss: True
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_epochs: 1
    shuffle: True
    optim:
      lr: 1e-6
      lr_warmup_steps_ratio: 0.0
      min_lr_ratio: null
      warmup_style: constant
      total_training_steps: -1
    fsdp_config:
      wrap_policy:
        min_num_params: 0
        transformer_layer_cls_to_wrap: Qwen2DecoderLayer
  ref:
    fsdp_config:
      wrap_policy:
        min_num_params: 0
        transformer_layer_cls_to_wrap: Qwen2DecoderLayer
  rollout:
    temperature: 0.7
    top_k: -1
    top_p: 1.0
    prompt_length: 1024
    response_length: 1024
    log_prob_micro_batch_size: 64
    tensor_model_parallel_size: 1
    name: vllm
    gpu_memory_utilization: 0.8 # Utilize more memory on A100
    n: 1

critic:
  strategy: fsdp
  optim:
    lr: 1e-5
    lr_warmup_steps_ratio: 0.0
    min_lr_ratio: null
    warmup_style: constant
    total_training_steps: -1
  model:
    path: /path/to/remote/model/Qwen2.5-0.5B-Instruct # Update this path
    enable_gradient_checkpointing: True
    use_remove_padding: True
    fsdp_config:
      wrap_policy:
        min_num_params: 0
        transformer_layer_cls_to_wrap: Qwen2DecoderLayer
  ppo_mini_batch_size: 256
  ppo_micro_batch_size: 64
  shuffle: True

reward_model:
  enable: True
  reward_manager: naive
  custom_reward_function:
    path: /path/to/remote/reward_fn.py # Update this path
    name: compute_reward
    reward_kwargs:
      w_format: 0.5
      w_process: 1.0
      w_outcome: 2.5
  ppo_mini_batch_size: 256
  ppo_micro_batch_size: 64

algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: gae
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.001

trainer:
  total_epochs: 3
  project_name: noise_math_remote
  experiment_name: qwen2.5-0.5b-ppo-remote
  n_gpus_per_node: 4 # 4x A100
  nnodes: 1
  save_freq: 50
  test_freq: 50
  val_before_train: True
  val_only: False
  logger: ['wandb', 'console']
